<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Thermomètre – Party Game</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2rem);
      --space-1: .25rem; --space-2: .5rem; --space-3: .75rem; --space-4: 1rem;
      --space-5: 1.25rem; --space-6: 1.5rem;

      --chill-main: #34d5ff; --chill-bg: #0f172a; --chill-soft: rgba(17, 24, 39, 0.7);
      --spicy-main: #ff7a3c; --spicy-bg: #2a0808; --spicy-soft: rgba(42, 8, 8, 0.8);
      --hard-main: #ff003c; --hard-bg: #050000; --hard-soft: rgba(10, 0, 5, 0.85);

      --mode-main: var(--chill-main);
      --mode-bg: var(--chill-bg);
      --mode-soft: var(--chill-soft);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased;text-size-adjust:none}
    
    /* ANIMATIONS GLOBALES */
    @keyframes floatChill { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    @keyframes pulseSpicy { 0%, 100% { box-shadow: inset 0 0 50px rgba(255,122,60,0.1); } 50% { box-shadow: inset 0 0 150px rgba(255,122,60,0.3); } }
    @keyframes glitchText { 0% { transform: translate(0) } 20% { transform: translate(-2px, 1px) } 40% { transform: translate(-1px, -1px) } 60% { transform: translate(2px, 1px) } 80% { transform: translate(1px, -1px) } 100% { transform: translate(0) } }
    @keyframes slotMachine { 0% { filter: blur(4px); transform: translateY(-10px); opacity: 0; } 50% { filter: blur(0px); transform: translateY(0); opacity: 1; } 100% { filter: blur(4px); transform: translateY(10px); opacity: 0; } }

    body {
      min-height: 100dvh;
      font-family: 'Satoshi', sans-serif;
      font-size: var(--text-base);
      display: flex; justify-content: center; align-items: stretch;
      padding: var(--space-4); color: #e5e7eb;
      transition: background 0.5s ease, box-shadow 0.5s ease;
      overflow-x: hidden;
    }

    /* THEMES */
    body.theme-chill { background: linear-gradient(-45deg, #0f172a, #1e3a8a, #064e3b, #0f172a); background-size: 400% 400%; animation: floatChill 15s ease infinite; }
    body.theme-spicy { background: radial-gradient(circle at center, #3f0909, #0a0101); animation: pulseSpicy 4s ease-in-out infinite; }
    body.theme-hardcore { background: #000; position: relative; }
    body.theme-hardcore::before {
      content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,0,60,0.1) 2px, rgba(255,0,60,0.1) 4px);
      pointer-events: none; z-index: -1;
    }
    body.theme-hardcore h1 { text-shadow: 2px 2px var(--hard-main), -2px -2px #00fff9; animation: glitchText 0.3s infinite; }

    @media (max-width: 600px){ body{padding:0;} }

    /* CONTENEUR PRINCIPAL (GLASSMORPHISM) */
    .app {
      width: 100%; max-width: 480px; min-height: 100%;
      background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-radius: 2.25rem; border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 80px rgba(0,0,0,.9);
      display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden;
      position: relative;
    }
    @media (max-width:600px){ .app{border-radius:0; border:none;} }

    header { padding: var(--space-4) var(--space-5) var(--space-3); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .brand-row { display: flex; align-items: center; justify-content: space-between; }
    h1 { font-size: var(--text-lg); font-weight: 900; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 0.2rem; }
    .subtitle { font-size: var(--text-xs); font-weight: 700; text-transform: uppercase; letter-spacing: .16em; color: var(--mode-main); }

    /* STEPPER */
    .stepper { display: flex; gap: .35rem; font-size: 0.65rem; text-transform: uppercase; font-weight: 800; margin-top: 1rem; }
    .step-pill { flex: 1; padding: .4rem .2rem; border-radius: 999px; background: rgba(255,255,255,0.05); text-align: center; color: rgba(255,255,255,0.4); transition: all 0.3s; }
    .step-pill.active { background: var(--mode-main); color: #000; box-shadow: 0 0 15px var(--mode-main); }

    main { flex: 1; display: flex; flex-direction: column; padding: var(--space-4); background: var(--mode-soft); }

    .screen { display: none; flex-direction: column; gap: var(--space-4); height: 100%; opacity: 0; transform: translateY(15px); transition: all .4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .screen.active { display: flex; opacity: 1; transform: translateY(0); }

    .card { background: rgba(0,0,0,0.4); border-radius: 1.5rem; padding: var(--space-4); border: 1px solid rgba(255,255,255,.05); }
    
    /* CARTES DE JEU */
    .question-card {
      background: linear-gradient(135deg, color-mix(in oklab, var(--mode-main) 40%, transparent), rgba(0,0,0,0.9));
      color: white; text-align: center; padding: var(--space-6) var(--space-4); border-radius: 1.5rem;
      box-shadow: 0 20px 50px rgba(0,0,0,.8), inset 0 0 20px rgba(255,255,255,0.05);
      border: 1px solid color-mix(in oklab, var(--mode-main) 30%, transparent);
    }
    .question-tag { font-size: var(--text-xs); text-transform: uppercase; letter-spacing: .16em; font-weight: 800; color: rgba(255,255,255,.6); margin-bottom: var(--space-3); }
    .question-text { font-size: var(--text-xl); font-weight: 900; line-height: 1.2; text-shadow: 0 4px 10px rgba(0,0,0,0.8); }

    /* LISTE DES JOUEURS */
    .players-list { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: 0.5rem; }
    .pill { padding: .4rem 1rem; border-radius: 999px; background: rgba(0,0,0,0.6); font-size: var(--text-xs); font-weight: 700; border: 1px solid rgba(255,255,255,0.1); }
    .pill.host { border-color: var(--mode-main); color: var(--mode-main); }
    .pill.me { outline: 2px solid #fff; }

    /* FORMULAIRES */
    label { display: block; font-size: var(--text-sm); font-weight: 700; margin-bottom: .4rem; color: #d1d5db; }
    .input { width: 100%; min-height: 54px; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.15); padding: 0 var(--space-4); font-size: var(--text-base); font-family: inherit; background: rgba(0,0,0,0.5); color: #fff; outline: none; transition: border-color 0.2s; }
    .input:focus { border-color: var(--mode-main); box-shadow: 0 0 15px rgba(255,255,255,0.1); }

    .modes { display: flex; gap: .5rem; margin-top: .5rem; }
    .mode-btn { flex: 1; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); padding: .8rem; font-size: var(--text-xs); font-weight: 800; text-transform: uppercase; color: #9ca3af; background: rgba(0,0,0,0.4); cursor: pointer; transition: all .2s; }
    .mode-btn.active { background: var(--mode-main); color: #000; transform: translateY(-2px); border-color: transparent; box-shadow: 0 10px 20px color-mix(in oklab, var(--mode-main) 30%, transparent); }

    .btn { border-radius: 1rem; border: none; padding: 1.2rem; font-size: var(--text-sm); font-weight: 900; text-transform: uppercase; letter-spacing: .05em; cursor: pointer; width: 100%; transition: all .2s; font-family: inherit; }
    .btn-primary { background: var(--mode-main); color: #000; box-shadow: 0 10px 30px color-mix(in oklab, var(--mode-main) 40%, transparent); }
    .btn-primary:active { transform: scale(.97); }
    .btn-ghost { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 0.8rem; }
    .btn-ghost:active { background: rgba(255,255,255,0.1); transform: scale(.98); }
    .btn[disabled] { opacity: .5; pointer-events: none; filter: grayscale(1); }

    /* SLIDER & THERMOMETRE */
    .slider-wrap { margin-top: var(--space-4); }
    .slider-value-bubble { display: inline-flex; justify-content: center; min-width: 5rem; padding: .5rem 1rem; border-radius: 1rem; background: var(--mode-main); color: #000; font-size: var(--text-xl); font-weight: 900; box-shadow: 0 10px 25px rgba(0,0,0,.6); margin: 0 auto 1.5rem; }
    
    input[type=range] { width: 100%; -webkit-appearance: none; background: transparent; margin-bottom: 2rem; }
    input[type=range]::-webkit-slider-runnable-track { height: 14px; border-radius: 999px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 34px; height: 34px; border-radius: 50%; background: #fff; border: 4px solid var(--mode-main); box-shadow: 0 0 20px var(--mode-main); margin-top: -11px; transition: transform .1s; cursor: grab; }
    input[type=range]:active::-webkit-slider-thumb { transform: scale(1.2); }

    .thermo-wrap { display: flex; flex-direction: column; align-items: center; gap: 0; margin-top: 1rem; }
    .thermo-bar { width: 44px; height: 180px; border-radius: 999px 999px 0 0; background: rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.1); border-bottom: none; padding: 4px; display: flex; align-items: flex-end; justify-content: center; z-index: 1; }
    .thermo-mercury { width: 100%; border-radius: 999px; height: 0%; background: var(--mode-main); transition: height 0.1s linear, background 0.3s ease; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
    .thermo-bulb { width: 60px; height: 60px; border-radius: 50%; background: var(--mode-main); margin-top: -15px; box-shadow: inset -5px -5px 15px rgba(0,0,0,0.6), 0 10px 20px rgba(0,0,0,.8); border: 2px solid rgba(255,255,255,0.1); z-index: 2; transition: background 0.3s; }

    /* ROULETTE DES GAGES */
    .roulette-box { background: #000; border: 2px solid var(--mode-main); border-radius: 1rem; padding: 1rem; text-align: center; margin: 1rem 0; overflow: hidden; height: 80px; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 0 20px rgba(255,0,60,0.4); }
    .roulette-text { font-size: var(--text-lg); font-weight: 900; color: #fff; white-space: nowrap; }
    .roulette-text.spin { animation: slotMachine 0.1s infinite linear; }

    /* CHRONO */
    .timer-bar-container { width: 100%; height: 8px; background: rgba(0,0,0,0.5); border-radius: 999px; overflow: hidden; margin-bottom: 1rem; }
    .timer-bar { height: 100%; width: 100%; background: #22c55e; transition: width 1s linear, background-color 0.5s; }
    .timer-bar.warning { background: #facc15; }
    .timer-bar.danger { background: #ef4444; }

    /* MODAL JOKER */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-card { background: var(--mode-soft); border: 1px solid var(--mode-main); padding: 2rem; border-radius: 1.5rem; width: 90%; max-width: 400px; text-align: center; }
    .modal-card h3 { font-size: var(--text-lg); margin-bottom: 1rem; }

    .big-number { font-size: 4rem; font-weight: 900; text-align: center; color: var(--mode-main); text-shadow: 0 5px 20px rgba(0,0,0,0.8); margin-bottom: 0.5rem; }
    .verdict-box { background: rgba(0,0,0,0.5); padding: 1rem; border-radius: 1rem; border-left: 4px solid var(--mode-main); font-weight: 800; text-align: center; margin-top: 1rem; }

    /* STATS */
    .stats-line { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: rgba(0,0,0,0.3); border-radius: 1rem; margin-bottom: 0.5rem; }
    .stats-name { font-weight: 900; font-size: var(--text-lg); }
    .stats-score { font-weight: 900; color: var(--mode-main); font-size: var(--text-xl); }
    .stats-desc { font-size: var(--text-xs); color: #9ca3af; margin-top: 0.2rem; }

    .joker-alert { background: #ff003c; color: white; padding: 1rem; border-radius: 1rem; text-align: center; font-weight: 900; margin-top: 1rem; animation: pulseSpicy 1s infinite; text-transform: uppercase; }

    .hidden { display: none !important; }
  </style>
</head>
<body class="theme-chill">
  <div class="app">
    <header>
      <div class="brand-row">
        <div>
          <h1>Le Thermomètre</h1>
          <div class="subtitle">Tranquille sur le canap</div>
        </div>
      </div>
      <div class="stepper" id="stepper">
        <div class="step-pill" data-step="lobby">Salon</div>
        <div class="step-pill" data-step="vote">Vote</div>
        <div class="step-pill" data-step="reveal">Résultat</div>
        <div class="step-pill" data-step="stats">Score</div>
      </div>
    </header>

    <main>
      <!-- ROLE -->
      <section class="screen active" id="screen-role" data-step="lobby">
        <div class="card" style="display:flex;flex-direction:column;gap:1rem;">
          <button class="btn btn-primary" id="roleHostBtn">Créer un salon</button>
          <button class="btn btn-ghost" id="rolePlayerBtn">Rejoindre un pote</button>
        </div>
      </section>

      <!-- SETUP HOST -->
      <section class="screen" id="screen-host-setup" data-step="lobby">
        <div class="card" style="display:flex;flex-direction:column;gap:1.5rem;">
          <div>
            <label>Ton prénom</label>
            <input id="hostName" class="input" placeholder="Ex. Alex" maxlength="15" />
          </div>
          <div>
            <label>Ambiance</label>
            <div class="modes">
              <button class="mode-btn active" data-mode="Chill">Chill</button>
              <button class="mode-btn" data-mode="Spicy">Spicy</button>
              <button class="mode-btn" data-mode="Hardcore">Hardcore</button>
            </div>
          </div>
          <button class="btn btn-primary" id="createRoomBtn">Lancer le salon</button>
        </div>
      </section>

      <!-- LOBBY HOST -->
      <section class="screen" id="screen-host-lobby" data-step="lobby">
        <div class="card">
          <h2 style="font-size:var(--text-lg);font-weight:900;margin-bottom:1rem;">Code : <span id="roomCodeHost" style="color:var(--mode-main);"></span></h2>
          
          <label>Dossiers anonymes (Optionnel)</label>
          <div style="display:flex; gap:0.5rem; margin-bottom: 1.5rem;">
            <input id="customQuestionHost" class="input" placeholder="Écris une question vicieuse..." style="min-height:44px; font-size:var(--text-sm);" />
            <button class="btn btn-ghost" id="submitCustomHostBtn" style="width:auto; padding:0 1rem;">Envoyer</button>
          </div>

          <label>Joueurs (<span id="hostPlayerCount">1</span>)</label>
          <div class="players-list" id="playersList"></div>

          <button class="btn btn-primary" id="startGameBtn" style="margin-top: 2rem;">Démarrer la partie</button>
        </div>
      </section>

      <!-- JOIN PLAYER -->
      <section class="screen" id="screen-player-join" data-step="lobby">
        <div class="card" style="display:flex;flex-direction:column;gap:1.5rem;">
          <div>
            <label>Code du salon</label>
            <input id="joinCode" class="input" placeholder="ABCD" maxlength="4" style="text-transform:uppercase;" />
          </div>
          <div>
            <label>Ton prénom</label>
            <input id="joinName" class="input" placeholder="Ex. Sam" maxlength="15" />
          </div>
          <button class="btn btn-primary" id="joinRoomBtn">Rejoindre</button>
        </div>
      </section>

      <!-- LOBBY PLAYER -->
      <section class="screen" id="screen-player-lobby" data-step="lobby">
        <div class="card">
          <h2 style="font-size:var(--text-lg);font-weight:900;margin-bottom:1rem;">Salon : <span id="roomCodePlayer" style="color:var(--mode-main);"></span></h2>
          
          <label>Dossiers anonymes</label>
          <div style="display:flex; gap:0.5rem; margin-bottom: 1.5rem;">
            <input id="customQuestionPlayer" class="input" placeholder="Balance un dossier..." style="min-height:44px; font-size:var(--text-sm);" />
            <button class="btn btn-ghost" id="submitCustomPlayerBtn" style="width:auto; padding:0 1rem;">Envoyer</button>
          </div>

          <label>Joueurs présents</label>
          <div class="players-list" id="playersListPlayer"></div>
          <p style="font-size:var(--text-xs); color:#9ca3af; margin-top:1.5rem; text-align:center;">En attente de l'hôte...</p>
        </div>
      </section>

      <!-- VOTE -->
      <section class="screen" id="screen-vote" data-step="vote">
        <div class="timer-bar-container"><div class="timer-bar" id="voteTimerBar"></div></div>
        <div class="question-card">
          <div class="question-tag" id="questionTag">Manche 1 • Cible : Alex</div>
          <div class="question-text" id="questionText">Question…</div>
        </div>
        
        <div class="card" style="margin-top:1rem; text-align:center;">
          <div class="slider-wrap">
            <div class="slider-value-bubble"><span id="sliderValue">50</span>%</div>
            <input type="range" id="voteSlider" min="0" max="100" value="50" />
          </div>
          <div style="font-size:var(--text-xs); color:#9ca3af; margin-bottom:1rem;" id="voteStatus">À toi de voter !</div>
          <button class="btn btn-primary" id="submitVoteBtn">Je valide</button>
        </div>
      </section>

      <!-- REVEAL -->
      <section class="screen" id="screen-reveal" data-step="reveal">
        <div class="question-card">
          <div class="question-tag">Résultat</div>
          <div class="question-text" id="revealQuestion" style="font-size:var(--text-lg); opacity:0.9;">Question…</div>
        </div>

        <div class="card" style="margin-top:1rem; display:flex; flex-direction:column; align-items:center;">
          <div style="font-size:var(--text-xs); text-transform:uppercase; letter-spacing:.1em; color:#9ca3af; margin-bottom:0.5rem;">Moyenne du groupe</div>
          <div class="big-number" id="averageValue">--%</div>
          
          <div class="thermo-wrap">
            <div class="thermo-bar"><div class="thermo-mercury" id="thermoReveal"></div></div>
            <div class="thermo-bulb" id="thermoBulbReveal"></div>
          </div>

          <div id="rouletteContainer" class="hidden" style="width:100%;">
            <div class="roulette-box">
              <div class="roulette-text" id="rouletteText">GÉNÉRATION DU GAGE...</div>
            </div>
          </div>

          <div id="jokerAlertContainer" class="hidden" style="width:100%;"></div>

          <div class="verdict-box" id="verdictText" style="width:100%;"></div>

          <div style="width:100%; margin-top:1.5rem; display:flex; flex-direction:column; gap:0.5rem;">
            <button class="btn btn-ghost" id="btnOpenJoker">Utiliser mon joker (<span id="myJokerName"></span>)</button>
            <button class="btn btn-primary hidden" id="nextRoundBtn">Manche suivante</button>
            <button class="btn btn-ghost hidden" id="endGameBtn">Terminer la partie</button>
          </div>
        </div>
      </section>

      <!-- STATS -->
      <section class="screen" id="screen-stats" data-step="stats">
        <div class="card">
          <h2 style="font-size:var(--text-xl); font-weight:900; text-align:center; margin-bottom:2rem;">Bilan de la soirée</h2>
          <div id="statsList"></div>
          <button class="btn btn-primary" id="restartBtn" style="margin-top:2rem;">Rejouer</button>
        </div>
      </section>
    </main>
  </div>

  <!-- MODAL JOKER -->
  <div class="modal-overlay" id="jokerModal">
    <div class="modal-card">
      <h3 id="jokerModalTitle">Action du Joker</h3>
      <p style="font-size:var(--text-sm); color:#9ca3af; margin-bottom:1.5rem;" id="jokerModalDesc"></p>
      
      <div id="jokerTargetSelectContainer" class="hidden" style="margin-bottom:1.5rem;">
        <label>Choisis ta victime :</label>
        <select id="jokerTargetSelect" class="input" style="appearance:none; text-align:center;"></select>
      </div>

      <div style="display:flex; gap:0.5rem;">
        <button class="btn btn-ghost" id="cancelJokerBtn">Annuler</button>
        <button class="btn btn-primary" id="confirmJokerBtn">Valider</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, update, push, off } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBEwzH6QEPWegpgBmnevtiBX9gqy3V3dcY",
      authDomain: "le-thermometre.firebaseapp.com",
      databaseURL: "https://le-thermometre-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "le-thermometre"
    };

    const appFb = initializeApp(firebaseConfig);
    const db = getDatabase(appFb);

    function generateCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let code = "";
      for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
      return code;
    }
    function generateId() { return Math.random().toString(36).slice(2, 10); }

    // Jokers Disponibles
    const JOKER_TYPES = ['SHIELD', 'DICTATOR', 'AMNESIAC'];
    const JOKER_LABELS = { 'SHIELD': 'Bouclier', 'DICTATOR': 'Dictateur', 'AMNESIAC': 'Amnésique' };
    
    function randomJoker() { return JOKER_TYPES[Math.floor(Math.random() * JOKER_TYPES.length)]; }

    window.firebaseApi = {
      db, ref, get, onValue, off, update, push, set,
      
      createRoom: async (hostName, mode) => {
        const hostId = generateId();
        let code = generateCode();
        let roomRef = ref(db, 'rooms/' + code);
        
        await set(roomRef, {
          mode, phase: 'LOBBY', round: 0, hostId, createdAt: Date.now(),
          customQuestions: [], currentRound: null, result: null,
          players: { [hostId]: { name: hostName, score: 0, joker: randomJoker(), jokerUsed: false, isHost: true } }
        });
        return { code, hostId };
      },

      joinRoom: async (code, playerName) => {
        const roomRef = ref(db, 'rooms/' + code);
        const snap = await get(roomRef);
        if (!snap.exists()) throw new Error('Salon introuvable');
        if (snap.val().phase !== 'LOBBY') throw new Error('Partie en cours');
        
        const playerId = generateId();
        await set(ref(db, `rooms/${code}/players/${playerId}`), {
          name: playerName, score: 0, joker: randomJoker(), jokerUsed: false, isHost: false
        });
        return { playerId };
      },

      addCustomQuestion: async (code, question) => {
        const qRef = push(ref(db, `rooms/${code}/customQuestions`));
        await set(qRef, question);
      },

      startRound: async (code, payload) => {
        await update(ref(db, 'rooms/' + code), { phase: 'VOTE', round: payload.round, currentRound: payload, result: null });
      },

      submitVote: async (code, roundId, playerId, value) => {
        await set(ref(db, `rooms/${code}/currentRound/votes/${playerId}`), { value, votedAt: Date.now() });
      },

      setReveal: async (code, result) => {
        await update(ref(db, 'rooms/' + code), { phase: 'REVEAL', result });
      },

      updateScores: async (code, scoreUpdates) => {
        const updates = {};
        Object.keys(scoreUpdates).forEach(id => { updates[`players/${id}/score`] = scoreUpdates[id]; });
        await update(ref(db, `rooms/${code}`), updates);
      },

      useJoker: async (code, playerId, roundId, jokerEvent) => {
        const updates = {};
        updates[`players/${playerId}/jokerUsed`] = true;
        updates[`currentRound/jokerEvent`] = jokerEvent;
        await update(ref(db, `rooms/${code}`), updates);
      },

      endGame: async (code) => { await update(ref(db, 'rooms/' + code), { phase: 'STATS' }); },
      resetRoom: async (code) => {
        const snap = await get(ref(db, `rooms/${code}/players`));
        const players = snap.val() || {};
        const updates = { phase: 'LOBBY', round: 0, currentRound: null, result: null, customQuestions: [] };
        Object.keys(players).forEach(id => {
          updates[`players/${id}/score`] = 0;
          updates[`players/${id}/joker`] = randomJoker();
          updates[`players/${id}/jokerUsed`] = false;
        });
        await update(ref(db, 'rooms/' + code), updates);
      }
    };
  </script>

  <script>
    // UTILITAIRES
    const $ = sel => document.querySelector(sel);
    const $all = sel => Array.from(document.querySelectorAll(sel));
    const vibrate = (pattern) => { if(navigator.vibrate) navigator.vibrate(pattern); };

    // CONFIGURATION
    const MODES = {
      Chill: { subtitle: 'Tranquille sur le canap' },
      Spicy: { subtitle: 'Les secrets tombent' },
      Hardcore: { subtitle: 'Préparez vos foies' }
    };

    const QUESTIONS = {
      Chill: ["Quel % de chances que {name} s'endorme en premier ?", "Quel % de chances que {name} ait le pire sens de l'orientation ?"],
      Spicy: ["Quel % de chances que {name} mente pour annuler une soirée ?", "Quel % de chances que {name} stalke son ex ?"],
      Hardcore: ["Quel % de chances que {name} trahisse le groupe pour 1000€ ?", "Quel % de chances que {name} finisse en garde à vue ce soir ?"]
    };

    const WHEEL_GAGES = ["CUL SEC !", "DISTRIBUE 4 GORGÉES", "BOIS 3 GORGÉES", "VÉRITÉ OU BOIS", "INVENTE UNE RÈGLE"];

    // ETAT GLOBAL
    let state = {
      role: null, mode: 'Chill', roomCode: null, playerId: null, players: [],
      roomData: null, currentVotes: {}, timerInterval: null, revealInterval: null
    };

    // UI ET THEMES
    function applyMode(mode) {
      state.mode = mode;
      document.body.className = 'theme-' + mode.toLowerCase();
      $('.subtitle').textContent = MODES[mode].subtitle;
      $all('.mode-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-mode') === mode));
    }

    function showScreen(stepId) {
      $all('.screen').forEach(s => s.classList.remove('active'));
      const target = document.getElementById(stepId);
      if(target) target.classList.add('active');
      const step = target ? target.getAttribute('data-step') : 'lobby';
      $all('.step-pill').forEach(p => p.classList.toggle('active', p.getAttribute('data-step') === step));
    }

    // THERMOMETRE DYNAMIQUE
    function getThermoColor(val) {
      const hue = Math.max(0, 200 - (val * 2)); // Blue to Red
      return `hsl(${hue}, 100%, 50%)`;
    }
    
    function updateThermoUI(val) {
      const mercury = $('#thermoReveal');
      const bulb = $('#thermoBulbReveal');
      mercury.style.height = `${Math.max(10, val)}%`;
      mercury.style.background = getThermoColor(val);
      bulb.style.background = getThermoColor(val);
    }

    // LOBBY & REJOINDRE
    $('#roleHostBtn').onclick = () => showScreen('screen-host-setup');
    $('#rolePlayerBtn').onclick = () => showScreen('screen-player-join');
    $all('.mode-btn').forEach(b => b.onclick = () => applyMode(b.getAttribute('data-mode')));

    $('#createRoomBtn').onclick = async () => {
      const name = $('#hostName').value.trim();
      if(!name) return;
      const res = await window.firebaseApi.createRoom(name, state.mode);
      state.role = 'HOST'; state.roomCode = res.code; state.playerId = res.hostId;
      $('#roomCodeHost').textContent = res.code;
      attachSync(res.code);
      showScreen('screen-host-lobby');
    };

    $('#joinRoomBtn').onclick = async () => {
      const code = $('#joinCode').value.trim().toUpperCase();
      const name = $('#joinName').value.trim();
      if(!code || !name) return;
      try {
        const res = await window.firebaseApi.joinRoom(code, name);
        state.role = 'PLAYER'; state.roomCode = code; state.playerId = res.playerId;
        $('#roomCodePlayer').textContent = code;
        attachSync(code);
        showScreen('screen-player-lobby');
      } catch(e) { alert(e.message); }
    };

    // DOSSIERS
    async function submitCustom(inputEl) {
      const q = inputEl.value.trim();
      if(!q || !state.roomCode) return;
      await window.firebaseApi.addCustomQuestion(state.roomCode, q);
      inputEl.value = '';
      inputEl.placeholder = 'Dossier envoyé ! Un autre ?';
    }
    $('#submitCustomHostBtn').onclick = () => submitCustom($('#customQuestionHost'));
    $('#submitCustomPlayerBtn').onclick = () => submitCustom($('#customQuestionPlayer'));

    // GESTION DU VOTE
    $('#voteSlider').oninput = (e) => {
      $('#sliderValue').textContent = e.target.value;
      vibrate(20);
    };

    $('#submitVoteBtn').onclick = async () => {
      if(!state.roomData?.currentRound?.id) return;
      const val = Number($('#voteSlider').value);
      await window.firebaseApi.submitVote(state.roomCode, state.roomData.currentRound.id, state.playerId, val);
      $('#submitVoteBtn').disabled = true;
      $('#submitVoteBtn').textContent = 'Vote enregistré';
      vibrate([50, 50]);
    };

    // JOKERS
    $('#btnOpenJoker').onclick = () => {
      const me = state.players.find(p => p.id === state.playerId);
      if(!me || me.jokerUsed) return;
      
      $('#jokerModalTitle').textContent = `Joker : ${JOKER_LABELS[me.joker]}`;
      const targetSelect = $('#jokerTargetSelectContainer');
      const select = $('#jokerTargetSelect');
      
      if(me.joker === 'DICTATOR') {
        $('#jokerModalDesc').textContent = "Choisis secrètement qui boira toutes les gorgées de cette manche. Ton nom ne sera pas affiché.";
        targetSelect.classList.remove('hidden');
        select.innerHTML = state.players.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
      } else if (me.joker === 'SHIELD') {
        $('#jokerModalDesc').textContent = "Annule tes gorgées pour cette manche.";
        targetSelect.classList.add('hidden');
      } else if (me.joker === 'AMNESIAC') {
        $('#jokerModalDesc').textContent = "Annule la manche pour tout le monde.";
        targetSelect.classList.add('hidden');
      }
      $('#jokerModal').classList.add('active');
    };

    $('#cancelJokerBtn').onclick = () => $('#jokerModal').classList.remove('active');
    
    $('#confirmJokerBtn').onclick = async () => {
      const me = state.players.find(p => p.id === state.playerId);
      let event = { type: me.joker, sourceId: state.playerId };
      
      if(me.joker === 'DICTATOR') {
        event.targetId = $('#jokerTargetSelect').value;
        event.targetName = state.players.find(p => p.id === event.targetId).name;
      }
      
      await window.firebaseApi.useJoker(state.roomCode, state.playerId, state.roomData.currentRound.id, event);
      $('#jokerModal').classList.remove('active');
      $('#btnOpenJoker').classList.add('hidden');
    };

    // ANIMATION ROULETTE
    async function spinRoulette() {
      const el = $('#rouletteText');
      $('#rouletteContainer').classList.remove('hidden');
      el.classList.add('spin');
      
      return new Promise(resolve => {
        let spins = 0;
        const iv = setInterval(() => {
          el.textContent = WHEEL_GAGES[Math.floor(Math.random() * WHEEL_GAGES.length)];
          spins++;
          vibrate(50);
          if(spins > 20) {
            clearInterval(iv);
            el.classList.remove('spin');
            const finalGage = WHEEL_GAGES[Math.floor(Math.random() * WHEEL_GAGES.length)];
            el.textContent = finalGage;
            vibrate([100, 50, 100]);
            resolve(finalGage);
          }
        }, 100);
      });
    }

    // MOTEUR DU JEU (HÔTE UNIQUEMENT)
    $('#startGameBtn').onclick = () => startNextRound();
    $('#nextRoundBtn').onclick = () => startNextRound();
    $('#endGameBtn').onclick = () => window.firebaseApi.endGame(state.roomCode);
    $('#restartBtn').onclick = () => window.firebaseApi.resetRoom(state.roomCode);

    async function startNextRound() {
      const roundNum = (state.roomData.round || 0) + 1;
      const target = state.players[Math.floor(Math.random() * state.players.length)];
      
      // Mix custom questions
      let qList = [...QUESTIONS[state.mode]];
      if(state.roomData.customQuestions) {
        const customs = Object.values(state.roomData.customQuestions);
        if(customs.length > 0) qList = qList.concat(customs);
      }
      
      let qText = qList[Math.floor(Math.random() * qList.length)];
      qText = qText.replace('{name}', target.name);

      await window.firebaseApi.startRound(state.roomCode, {
        id: 'R_' + Date.now(), round: roundNum,
        targetId: target.id, targetName: target.name,
        question: qText, startedAt: Date.now()
      });
    }

    async function forceReveal() {
      if(state.role !== 'HOST' || state.roomData.phase !== 'VOTE') return;
      const cr = state.roomData.currentRound;
      
      // Auto-vote for late players
      for(let p of state.players) {
        if(!cr.votes || !cr.votes[p.id]) {
          await window.firebaseApi.submitVote(state.roomCode, cr.id, p.id, 100); // Penalty for late
        }
      }

      // Re-fetch to ensure we have all votes
      const snap = await window.firebaseApi.get(window.firebaseApi.ref(window.firebaseApi.db, `rooms/${state.roomCode}/currentRound/votes`));
      const votesMap = snap.val() || {};
      
      const values = Object.values(votesMap).map(v => Number(v.value));
      const average = Math.round(values.reduce((a,b)=>a+b,0) / values.length);
      const targetVote = votesMap[cr.targetId] ? Number(votesMap[cr.targetId].value) : 50;
      const diff = Math.abs(targetVote - average);

      await window.firebaseApi.setReveal(state.roomCode, {
        roundId: cr.id, average, targetId: cr.targetId, targetName: cr.targetName, diff
      });
    }

    // SYNCHRONISATION FIREBASE REALTIME
    function attachSync(code) {
      window.firebaseApi.onValue(window.firebaseApi.ref(window.firebaseApi.db, 'rooms/' + code), (snap) => {
        const data = snap.val();
        if(!data) return;
        state.roomData = data;
        
        if(data.mode !== state.mode) applyMode(data.mode);
        
        state.players = Object.entries(data.players || {}).map(([id, p]) => ({ id, ...p }));
        $('#hostPlayerCount').textContent = state.players.length;
        
        const renderPill = p => `<span class="pill ${p.isHost?'host':''} ${p.id===state.playerId?'me':''}">${p.name} ${p.isHost?'👑':''}</span>`;
        $('#playersList').innerHTML = state.players.map(renderPill).join('');
        $('#playersListPlayer').innerHTML = state.players.map(renderPill).join('');

        if(data.phase === 'LOBBY') {
          showScreen(state.role === 'HOST' ? 'screen-host-lobby' : 'screen-player-lobby');
        } 
        else if (data.phase === 'VOTE') {
          handleVotePhase(data);
        }
        else if (data.phase === 'REVEAL') {
          handleRevealPhase(data);
        }
        else if (data.phase === 'STATS') {
          handleStatsPhase(data);
        }
      });
    }

    function handleVotePhase(data) {
      showScreen('screen-vote');
      clearInterval(state.timerInterval);
      
      const cr = data.currentRound;
      $('#questionTag').textContent = `Manche ${data.round} • Cible : ${cr.targetName}`;
      $('#questionText').textContent = cr.question;
      
      const myVote = cr.votes?.[state.playerId];
      $('#submitVoteBtn').disabled = !!myVote;
      $('#submitVoteBtn').textContent = myVote ? 'Vote enregistré' : 'Je valide';
      
      const votesCount = Object.keys(cr.votes || {}).length;
      $('#voteStatus').textContent = `${votesCount} / ${state.players.length} votes`;

      // Timer Logic
      const timeLimit = Math.max(5, 15 - data.round); // S'accélère !
      const elapsed = (Date.now() - cr.startedAt) / 1000;
      let timeLeft = timeLimit - elapsed;

      state.timerInterval = setInterval(() => {
        timeLeft -= 0.1;
        const pct = Math.max(0, (timeLeft / timeLimit) * 100);
        const bar = $('#voteTimerBar');
        bar.style.width = pct + '%';
        bar.className = 'timer-bar ' + (pct < 30 ? 'danger' : (pct < 60 ? 'warning' : ''));
        
        if(timeLeft <= 3 && Math.floor(timeLeft*10)%10 === 0) vibrate(50); // Heartbeat
        
        if(timeLeft <= 0) {
          clearInterval(state.timerInterval);
          if(state.role === 'HOST' && votesCount < state.players.length) forceReveal();
        }
      }, 100);

      // Auto reveal if everyone voted
      if(state.role === 'HOST' && votesCount >= state.players.length && !data.result) {
        clearInterval(state.timerInterval);
        forceReveal();
      }
    }

    async function handleRevealPhase(data) {
      showScreen('screen-reveal');
      clearInterval(state.timerInterval);
      clearInterval(state.revealInterval);
      
      const res = data.result;
      const cr = data.currentRound;
      $('#revealQuestion').textContent = cr.question;
      $('#rouletteContainer').classList.add('hidden');
      $('#jokerAlertContainer').classList.add('hidden');
      $('#verdictText').innerHTML = '';
      
      // Check Joker Usage
      const jokerEvent = cr.jokerEvent;
      let isAmnesia = false;
      let actualTargetId = res.targetId;
      let actualTargetName = res.targetName;

      if(jokerEvent) {
        const alertBox = $('#jokerAlertContainer');
        alertBox.classList.remove('hidden');
        if(jokerEvent.type === 'AMNESIAC') {
          isAmnesia = true;
          alertBox.innerHTML = `<div class="joker-alert">L'Amnésique a frappé ! Manche annulée !</div>`;
        } else if (jokerEvent.type === 'DICTATOR') {
          actualTargetId = jokerEvent.targetId;
          actualTargetName = jokerEvent.targetName;
          alertBox.innerHTML = `<div class="joker-alert">Un Dictateur a sévi !<br/>${actualTargetName} prend tout !</div>`;
        } else if (jokerEvent.type === 'SHIELD' && jokerEvent.sourceId === res.targetId) {
          alertBox.innerHTML = `<div class="joker-alert">${res.targetName} a utilisé un Bouclier ! 0 Gorgée !</div>`;
        }
      }

      // Animation du Thermomètre
      $('#averageValue').textContent = '0%';
      updateThermoUI(0);
      
      let currentAvg = 0;
      state.revealInterval = setInterval(async () => {
        currentAvg += 2;
        if(currentAvg >= res.average) {
          currentAvg = res.average;
          clearInterval(state.revealInterval);
          vibrate([100, 50, 100]);
        }
        $('#averageValue').textContent = currentAvg + '%';
        updateThermoUI(currentAvg);

        // Une fois l'animation finie, on affiche le verdict
        if(currentAvg === res.average && !isAmnesia) {
          let sips = 1;
          if(res.diff > 20) sips = 2;
          if(data.mode === 'Hardcore') sips++;

          let text = '';
          if(res.diff <= 15) {
            text = `🔥 Bien visé ! ${res.targetName} est sauvé(e). Tout le monde boit 1 gorgée.`;
          } else {
            if(res.diff > 40) {
              const gage = await spinRoulette();
              text = `💥 CRITIQUE (${res.diff}% d'écart) !<br/>${actualTargetName} : ${gage}`;
              sips = 4; // Arbitrary score penalty
            } else {
              text = `💥 ${res.diff}% d'écart.<br/>${actualTargetName} boit ${sips} gorgées.`;
            }
          }
          
          if(jokerEvent?.type === 'SHIELD' && jokerEvent.sourceId === actualTargetId) {
             text = `🛡️ Sauvé par le bouclier ! Personne ne boit.`;
             sips = 0;
          }

          $('#verdictText').innerHTML = text;

          // Mise à jour des scores (seulement l'hôte le fait pour éviter les doublons)
          if(state.role === 'HOST' && !data.currentRound.scoresUpdated) {
            const scoreUpdates = {};
            state.players.forEach(p => {
              let add = 0;
              if (res.diff <= 15) add = 1;
              else if (p.id === actualTargetId) add = sips;
              scoreUpdates[p.id] = p.score + add;
            });
            await window.firebaseApi.updateScores(state.roomCode, scoreUpdates);
            await window.firebaseApi.update(window.firebaseApi.ref(window.firebaseApi.db, `rooms/${state.roomCode}/currentRound`), { scoresUpdated: true });
          }
        }
      }, 30);

      // UI Joker personnel
      const me = state.players.find(p => p.id === state.playerId);
      if(me && !me.jokerUsed && !jokerEvent) {
        $('#btnOpenJoker').classList.remove('hidden');
        $('#myJokerName').textContent = JOKER_LABELS[me.joker];
      } else {
        $('#btnOpenJoker').classList.add('hidden');
      }

      if(state.role === 'HOST') {
        setTimeout(() => {
          $('#nextRoundBtn').classList.remove('hidden');
          $('#endGameBtn').classList.remove('hidden');
        }, 2000);
      }
    }

    function handleStatsPhase(data) {
      showScreen('screen-stats');
      const list = $('#statsList');
      list.innerHTML = '';
      
      const sorted = [...state.players].sort((a,b) => b.score - a.score);
      
      sorted.forEach((p, idx) => {
        let desc = "Rien de spécial, bois ton eau.";
        if(idx === 0) desc = "A pris le plus cher. Cul sec !";
        if(idx === sorted.length - 1 && sorted.length > 1) desc = "A esquivé les balles. Distribue 3 gorgées.";
        
        list.innerHTML += `
          <div class="stats-line">
            <div>
              <div class="stats-name">${idx+1}. ${p.name}</div>
              <div class="stats-desc">${desc}</div>
            </div>
            <div class="stats-score">${p.score} pts</div>
          </div>
        `;
      });

      $('#restartBtn').style.display = state.role === 'HOST' ? 'block' : 'none';
    }
  </script>
</body>
</html>
